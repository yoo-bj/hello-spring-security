<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>관리자 대시보드 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
        .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.4rem; }
        .admin-header { background: linear-gradient(135deg, #f093fb, #f5576c); color: #fff; border-radius: 16px; }
        .menu-card { border: none; border-radius: 12px; transition: transform .2s; cursor: pointer; }
        .menu-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,.12); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">HanSung</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/home}">홈</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/products}">상품 목록</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/products/add}">상품 등록</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/admin/dashboard}">관리자</a></li>
            </ul>
            <form th:action="@{/logout}" method="post" class="d-flex">
                <button class="btn btn-outline-light btn-sm px-3">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div class="admin-header p-4 mb-4">
        <h4 class="fw-bold mb-0" th:text="${pageTitle}">관리자 대시보드</h4>
        <p class="mb-0 opacity-75">ADMIN 권한 전용 영역입니다.</p>
    </div>

    <!-- 통계 요약 -->
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card menu-card p-4 border-start border-4 border-primary">
                <h6 class="fw-bold text-muted">전체 회원 수</h6>
                <p class="fs-2 fw-bold mb-0" th:text="${userCount}">0</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card menu-card p-4 border-start border-4 border-success">
                <h6 class="fw-bold text-muted">전체 상품 수</h6>
                <p class="fs-2 fw-bold mb-0" th:text="${productCount}">0</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card menu-card p-4 border-start border-4 border-danger">
                <h6 class="fw-bold text-muted">재고 없는 상품</h6>
                <p class="fs-2 fw-bold mb-0 text-danger" th:text="${outOfStockCount}">0</p>
            </div>
        </div>
    </div>

    <!-- 관리 메뉴 -->
    <div class="row g-3">
        <div class="col-md-4">
            <div class="card menu-card p-4 border-start border-4 border-primary">
                <h6 class="fw-bold">상품 관리</h6>
                <p class="text-muted small mb-3">상품 목록 조회 및 등록</p>
                <div class="d-flex gap-2">
                    <a th:href="@{/products}" class="btn btn-primary btn-sm">목록</a>
                    <a th:href="@{/products/add}" class="btn btn-outline-primary btn-sm">등록</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card menu-card p-4 border-start border-4 border-success">
                <h6 class="fw-bold">시스템 정보</h6>
                <p class="text-muted small mb-3">Spring Boot 4 + Security 7</p>
                <span class="badge bg-success">운영 중</span>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card menu-card p-4 border-start border-4 border-warning">
                <h6 class="fw-bold">접속 계정</h6>
                <p class="text-muted small mb-3">
                    <span sec:authentication="name" class="fw-semibold"></span>
                </p>
                <span class="badge bg-warning text-dark">ADMIN</span>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
<footer>
    <p th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 HH:mm:ss') + '  │  학번: 2371466  │  성명: 유범준'}"></p>
</footer>
</html>
