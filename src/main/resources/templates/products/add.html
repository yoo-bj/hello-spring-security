<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>상품 등록 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
        .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.4rem; }
        .form-card { border: none; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
        .page-header { border-left: 4px solid #e94560; padding-left: 1rem; }
        .btn-register { background: #e94560; border-color: #e94560; }
        .btn-register:hover { background: #c73652; border-color: #c73652; }
        .form-control:focus, .form-select:focus {
            border-color: #e94560; box-shadow: 0 0 0 0.2rem rgba(233,69,96,.2);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">HanSung</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/home}">홈</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/products}">상품 목록</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link active" th:href="@{/products/add}">상품 등록</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/dashboard}">관리자</a>
                </li>
            </ul>
            <form th:action="@{/logout}" method="post" class="d-flex">
                <button class="btn btn-outline-light btn-sm px-3">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div class="page-header mb-4">
        <h4 class="fw-bold mb-0">상품 등록</h4>
        <small class="text-muted">새로운 상품 정보를 입력해주세요.</small>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card form-card">
                <div class="card-body p-5">
                    <form th:action="@{/products}" th:object="${product}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">상품명 <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{name}" class="form-control form-control-lg"
                                   placeholder="상품명을 입력하세요" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">가격 (원) <span class="text-danger">*</span></label>
                            <div class="input-group input-group-lg">
                                <input type="number" th:field="*{price}" class="form-control"
                                       placeholder="0" min="0" required/>
                                <span class="input-group-text">원</span>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">재고 수량 <span class="text-danger">*</span></label>
                            <div class="input-group input-group-lg">
                                <input type="number" th:field="*{stock}" class="form-control"
                                       placeholder="0" min="0" required/>
                                <span class="input-group-text">개</span>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">상품 설명</label>
                            <textarea th:field="*{description}" class="form-control" rows="3"
                                      placeholder="상품 설명을 입력하세요"></textarea>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-register text-white btn-lg flex-grow-1 fw-semibold">등록</button>
                            <a th:href="@{/products}" class="btn btn-outline-secondary btn-lg px-4">취소</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
<footer>
    <p th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 HH:mm:ss') + '  │  학번: 2371466  │  성명: 유범준'}"></p>
</footer>
</html>
