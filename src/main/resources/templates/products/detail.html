<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${product.name} + ' - HanSung'">상품 상세 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
        .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.4rem; }
        .detail-card { border: none; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
        .price-badge { font-size: 1.8rem; font-weight: 800; color: #e94560; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">HanSung</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/home}">홈</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/products}">상품 목록</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/products/add}">상품 등록</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/dashboard}">관리자</a>
                </li>
            </ul>
            <form th:action="@{/logout}" method="post" class="d-flex">
                <button class="btn btn-outline-light btn-sm px-3">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card detail-card p-5">
                <h3 class="fw-bold mb-1" th:text="${product.name}"></h3>
                <p class="text-muted small mb-4"
                   th:text="'등록일: ' + ${#temporals.format(product.createdAt, 'yyyy-MM-dd')}"></p>

                <div class="price-badge mb-3"
                     th:text="${#numbers.formatInteger(product.price, 1, 'COMMA') + '원'}"></div>

                <p class="text-muted" th:text="${product.description}"></p>

                <div class="mt-3">
                    <span class="badge bg-secondary px-3 py-2"
                          th:text="'재고: ' + ${product.stock} + '개'"></span>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <a th:href="@{/products}" class="btn btn-outline-secondary">목록으로</a>
                    <form th:action="@{/products/{id}/delete(id=${product.id})}" method="post"
                          sec:authorize="hasRole('ADMIN')" onsubmit="return confirm('삭제하시겠습니까?')">
                        <button class="btn btn-outline-danger">삭제</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
<footer>
    <p th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 HH:mm:ss') + '  │  학번: 2371466  │  성명: 유범준'}"></p>
</footer>
</html>
